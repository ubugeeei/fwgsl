name = "shadml"
grammar = "shadml"
path_suffixes = ["shadml"]
line_comments = ["-- "]
block_comment = ["{- ", " -}"]
autoclose_before = ";:.,=}])|> "
brackets = [
  { start = "(", end = ")", close = true, newline = true },
  { start = "[", end = "]", close = true, newline = true },
  { start = "{", end = "}", close = true, newline = true },
  { start = "{-", end = "-}", close = true, newline = false },
]
word_characters = ["'"]
tab_size = 2
